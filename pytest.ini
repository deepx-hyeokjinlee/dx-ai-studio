[pytest]
testpaths = tests
markers =
    requires_node: requires Node.js
    requires_pillow: requires Pillow/PIL
    requires_dx_runtime: requires sibling dx-runtime checkout
    external: optional external integration tests
    smoke: browser or process smoke tests
    e2e: live dx_com integration (requires venv-dx-compiler-local)
    help_audit: exhaustive browser Help state audit
